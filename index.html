<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYA MOBIL - Eksklusivitas & Kualitas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #000; --card: #111; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow-x: hidden; }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .hero h1 { font-size: 3.5rem; color: var(--gold); margin-bottom: 10px; letter-spacing: 5px; }
        .hero p { font-size: 1.2rem; max-width: 600px; line-height: 1.6; color: #ccc; }
        .btn-koleksi { 
            margin-top: 30px; padding: 15px 40px; background: var(--gold); 
            color: black; text-decoration: none; font-weight: bold; border-radius: 50px;
            transition: 0.3s;
        }
        .btn-koleksi:hover { transform: scale(1.1); background: white; }

        /* --- KATALOG SECTION --- */
        .section-title { text-align: center; padding: 50px 20px 20px; color: var(--gold); letter-spacing: 2px; }
        .catalog-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; padding: 40px; max-width: 1200px; margin: auto;
        }

        .car-card { 
            background: var(--card); border-radius: 20px; overflow: hidden; 
            border: 1px solid #222; transition: 0.3s; cursor: pointer;
        }
        .car-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .img-wrapper { width: 100%; height: 220px; overflow: hidden; position: relative; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .car-card:hover .img-wrapper img { transform: scale(1.1); }

        .info { padding: 25px; }
        .info h3 { margin: 0 0 10px 0; font-size: 1.4rem; }
        .info .price { color: var(--gold); font-size: 1.2rem; font-weight: bold; }
        .info .spec { display: flex; gap: 15px; margin-top: 15px; color: #888; font-size: 0.9rem; }

        /* --- LIGHTBOX POPUP --- */
        #lightbox {
            display: none; position: fixed; z-index: 10000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.97);
            justify-content: center; align-items: center; flex-direction: column;
        }
        #lightbox-img { 
            max-width: 85%; max-height: 75%; border: 2px solid var(--gold); 
            border-radius: 10px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }
        .lb-info { margin-top: 20px; text-align: center; }
        .lb-info h2 { color: var(--gold); margin-bottom: 5px; }
        
        .close-btn { position: absolute; top: 30px; right: 40px; font-size: 40px; color: white; cursor: pointer; }
        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            font-size: 45px; color: var(--gold); cursor: pointer; padding: 20px;
            background: rgba(0,0,0,0.2); border-radius: 50%;
        }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .catalog-grid { padding: 20px; }
            .nav-btn { font-size: 30px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>EKSKLUSIVITAS</h1>
        <p>Temukan unit terbaik dengan kualitas terjamin. Kepuasan Anda adalah prioritas utama kami di JAYA MOBIL.</p>
        <a href="#katalog" class="btn-koleksi">LIHAT KOLEKSI</a>
    </section>

    <div id="katalog">
        <h2 class="section-title">UNIT TERBARU KAMI</h2>
        <div class="catalog-grid" id="main-catalog">
            </div>
    </div>

    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <i class="fas fa-chevron-left nav-btn prev-btn" onclick="changeSlide(-1)"></i>
        <img id="lightbox-img" src="">
        <div class="lb-info">
            <h2 id="lb-title">Nama Mobil</h2>
            <p id="lb-price">Harga</p>
        </div>
        <i class="fas fa-chevron-right nav-btn next-btn" onclick="changeSlide(1)"></i>
    </div>

    <script>
        let carsData = [];
        let currentIndex = 0;

        // 1. Ambil data dari LocalStorage (Yang diinput di Admin)
        function loadKatalog() {
            // Kita gunakan data 'car_stok' yang sama dengan file admin
            carsData = JSON.parse(localStorage.getItem('car_stok')) || [];
            const container = document.getElementById('main-catalog');

            if(carsData.length === 0) {
                container.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Katalog sedang diperbarui oleh admin...</p>";
                return;
            }

            container.innerHTML = carsData.map((car, index) => `
                <div class="car-card" onclick="openLightbox(${index})">
                    <div class="img-wrapper">
                        <img src="${car.img}" alt="${car.name}">
                    </div>
                    <div class="info">
                        <h3>${car.name}</h3>
                        <div class="price">Rp ${car.price}</div>
                        <div class="spec">
                            <span><i class="far fa-calendar-alt"></i> ${car.year || '2024'}</span>
                            <span><i class="fas fa-gas-pump"></i> ${car.fuel || 'Bensin'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 2. Fungsi Popup/Lightbox
        function openLightbox(index) {
            currentIndex = index;
            const car = carsData[currentIndex];
            
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('lightbox-img').src = car.img;
            document.getElementById('lb-title').innerText = car.name;
            document.getElementById('lb-price').innerText = "Rp " + car.price;
            
            document.body.style.overflow = 'hidden'; // Kunci scroll layar belakang
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto'; // Aktifkan scroll lagi
        }

        // 3. Navigasi Next/Prev di dalam Popup
        function changeSlide(direction) {
            currentIndex += direction;
            
            if (currentIndex >= carsData.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = carsData.length - 1;

            const car = carsData[currentIndex];
            document.getElementById('lightbox-img').src = car.img;
            document.getElementById('lb-title').innerText = car.name;
            document.getElementById('lb-price').innerText = "Rp " + car.price;
        }

        // Jalankan fungsi saat halaman dimuat
        window.onload = loadKatalog;

        // Tambahan: Tambah jumlah Visit (sinkron dengan admin)
        let visits = parseInt(localStorage.getItem('visitor_count') || "1200");
        localStorage.setItem('visitor_count', visits + 1);
    </script>
</body>
</html>

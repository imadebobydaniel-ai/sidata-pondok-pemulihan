<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        :root { --primary: #ffc107; --bg: #0f172a; --card: #1e293b; --error: #ef4444; --success: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body {
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative; margin: 0;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('poster_papua.jpg') no-repeat center center fixed;
            background-size: cover; color: white;
        }

        /* Overlay Login */
        #login-overlay { 
            position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.98); 
            display: flex; justify-content: center; align-items: center; 
            z-index: 100000; 
        }
        
        .login-card { 
            background: rgba(255, 255, 255, 0.05); padding: 40px; 
            border-radius: 15px; border: 1px solid var(--primary); 
            width: 100%; max-width: 400px; text-align: center; 
            backdrop-filter: blur(10px); position: relative;
        }

        /* Password Wrapper & Eye Logic */
        .password-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        .eye-icon {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; font-size: 1.2rem; color: var(--primary); transition: 0.3s;
        }

        /* Animasi Mata Menangis */
        .tear {
            position: absolute; color: #60a5fa; font-size: 10px;
            top: 50%; right: 20px; opacity: 0; pointer-events: none;
        }
        @keyframes crying {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(20px); opacity: 0; }
        }
        .animate-tear { animation: crying 0.8s infinite; }
        .shake { animation: shake 0.5s; border-color: var(--error) !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Efek Flash Kedip */
        .flash-blink { animation: flash-anim 0.5s alternate 2; }
        @keyframes flash-anim {
            from { filter: brightness(1); }
            to { filter: brightness(3) drop-shadow(0 0 10px white); }
        }

        /* Rest of UI */
        .main-container { position: fixed; top: 80px; width: 100%; height: calc(100% - 80px); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        #top-bar-info { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 2px solid var(--primary); z-index: 100; }
        .hidden { display: none !important; }
        .card-form { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 900px; border: 1px solid var(--primary); margin-bottom: 50px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; margin-top: 5px; }
        .btn-masuk { background: var(--primary); color: black; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-batal { background: #e11d48; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card" id="card-box">
            <img src="logo_pope.png" style="width: 80px; margin-bottom: 20px;">
            <h2 style="color: var(--primary);">ADMIN PORTAL</h2>
            <p style="font-size: 0.8rem; margin-bottom: 20px; color: #ccc;">Sistem Informasi Pondok Pemulihan</p>
            
            <form id="loginForm">
                <input type="text" id="username_input" placeholder="Username" required style="margin-bottom:10px;">
                
                <div class="password-wrapper">
                    <input type="password" id="password_input" placeholder="Password" required>
                    <i class="fas fa-eye eye-icon" id="eye-toggle"></i>
                    <span class="tear" id="tear-drop">💧</span>
                </div>

                <button type="submit" class="btn-masuk">MASUK SISTEM</button>
            </form>
        </div>
    </div>

    <div id="top-bar-info" class="hidden">
        <div><p id="display-date">Memuat...</p><p id="display-clock" style="color: var(--primary); font-weight:bold;">00:00:00</p></div>
        <h3>PONDOK PEMULIHAN PAPUA</h3>
        <button onclick="prosesLogout()" class="btn-batal">LOGOUT</button>
    </div>

    <div class="main-container hidden" id="content-app">
        <section id="welcome-view" style="text-align: center;">
            <img src="logo_pope.png" style="width: 120px; margin-bottom: 20px;">
            <h1>SISTEM BERHASIL DIAKSES</h1>
            <p style="color: var(--primary); margin-top: 10px;">Selamat Bekerja, Admin.</p>
            <div style="margin-top:30px;">
                <button onclick="alert('Fitur segera hadir!')" class="btn-masuk" style="width: auto; padding: 10px 20px;">BUKA DATABASE</button>
            </div>
        </section>
    </div>

    <script type="module">
        const eye = document.getElementById('eye-toggle');
        const passInput = document.getElementById('password_input');
        const cardBox = document.getElementById('card-box');
        const tear = document.getElementById('tear-drop');

        // Toggle Sembunyi/Lihat Password
        eye.onclick = () => {
            const type = passInput.type === 'password' ? 'text' : 'password';
            passInput.type = type;
            eye.classList.toggle('fa-eye-slash');
        };

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('username_input').value;
            const pass = passInput.value;

            // Logika Login
            if (user === "admin_papua" && pass === "papua123") {
                // EFEK BERHASIL: Kedip & Flash
                eye.className = "fas fa-smile eye-icon flash-blink";
                setTimeout(() => {
                    localStorage.setItem('isLoggedIn', 'true');
                    showDashboard();
                }, 1000);
            } else {
                // EFEK GAGAL: Menangis & Getar
                cardBox.classList.add('shake');
                eye.className = "fas fa-sad-tear eye-icon";
                tear.classList.add('animate-tear');
                
                setTimeout(() => {
                    cardBox.classList.remove('shake');
                    tear.classList.remove('animate-tear');
                    eye.className = "fas fa-eye eye-icon";
                    alert("Akses Ditolak! Cek Username/Password.");
                }, 1500);
            }
        };

        function showDashboard() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('top-bar-info').classList.remove('hidden');
            document.getElementById('content-app').classList.remove('hidden');
        }

        window.prosesLogout = () => {
            localStorage.removeItem('isLoggedIn');
            location.reload();
        };

        // Auto-login check
        if (localStorage.getItem('isLoggedIn') === 'true') showDashboard();

        // Jam Realtime
        setInterval(() => {
            const n = new Date();
            document.getElementById('display-clock').innerText = n.toLocaleTimeString('id-ID');
            document.getElementById('display-date').innerText = n.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});
        }, 1000);
    </script>
</body>
</html>

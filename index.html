<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        /* RESET & BASE STYLES */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative; margin: 0;
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), 
                        url('poster_papua.jpg') no-repeat center center fixed;
            background-size: cover; color: white;
        }
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.4) 0%, rgba(15, 23, 42, 0.2) 50%, rgba(15, 23, 42, 0.7) 100%);
            z-index: 0;
        }

        /* CONTAINER UTAMA SIMETRIS */
        .main-container {
            position: fixed;
            top: 80px;
            width: 100%;
            height: calc(100% - 80px);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center; /* Konten benar-benar di tengah layar */
            z-index: 10;
        }

        /* LOGIN STYLES */
        #login-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: flex; justify-content: center; align-items: center; z-index: 100000; }
        .login-card { background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.2); width: 100%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); }
        .login-card input, .form-group input, .form-group select { width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 15px; border-radius: 8px; background: white; color: #1e293b; border: 2px solid #ffc107; }
        
        /* TOP BAR & NAV */
        #top-bar-info { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 2px solid #ffc107; z-index: 100; }
        .navigasi-wrapper { position: fixed; top: 100px; left: 30px; z-index: 10006; }
        .navigasi-header { background: #ffc107; color: black; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .menu-content { list-style: none; display: none; background: rgba(0, 0, 0, 0.9); padding: 15px; border-radius: 10px; margin-top: 10px; }
        .menu-content.active { display: flex; flex-direction: column; gap: 10px; }
        .menu-content a { color: white; text-decoration: none; font-size: 14px; }
        .menu-content a:hover { color: #ffc107; }

        /* WELCOME VIEW STYLES */
        #welcome-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
        }
        #welcome-view h1 {
            margin: 10px 0;
            font-size: 2.5rem;
        }
        #welcome-view h3 {
            margin: 0;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* FORM & TABLE */
        .hidden { display: none !important; }
        .card-form { background: rgba(0, 0, 0, 0.6); padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; border: 1px solid #ffc107; }
        .form-group { text-align: left; margin-bottom: 10px; }
        .btn-masuk, .btn-submit { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-batal { background: #e11d48; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.5); color: white; border-radius: 10px; overflow: hidden; margin-top: 20px; font-size: 0.9rem; }
        th { background: #ffc107; color: black; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <img src="logo_pope.png" style="width: 80px; margin-bottom: 20px;">
            <h2 style="color: #ffc107;">PORTAL LOGIN</h2>
            <p style="font-size: 0.8rem; margin-bottom: 20px;">Pondok Pemulihan Papua</p>
            
            <form id="loginForm">
                <div style="position: relative;">
                    <input type="text" id="username_input" placeholder="Username" required>
                </div>
                <div style="position: relative;">
                    <input type="password" id="password_input" placeholder="Password" required style="padding-right: 40px;">
                    <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 15px; color: #ffc107; cursor: pointer; z-index: 100;"></i>
                </div>
                <button type="submit" class="btn-masuk">MASUK KE SISTEM</button>
            </form>
        </div>
    </div>

    <div id="top-bar-info">
        <div>
            <p id="display-date">Memuat...</p>
            <p id="display-clock" style="font-weight: bold; color: #ffc107;">00:00:00</p>
        </div>
        <h3>PONDOK PEMULIHAN PAPUA</h3>
        <button onclick="prosesLogout()" class="btn-batal"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
    </div>

    <div class="navigasi-wrapper">
        <div class="navigasi-header" id="nav-header">NAVIGASI PORTAL ▼</div>
        <ul id="menu-list" class="menu-content">
            <li><a href="#" id="menu-beranda">Beranda</a></li>
            <li><a href="#" id="menu-database">Database Jemaat</a></li>
            <li><a href="#" id="menu-input">Input Data Jemaat</a></li>
            <li><hr style="border-color: #333;"></li>
            <li><a href="#" id="menu-logout" onclick="prosesLogout()">Keluar Sistem</a></li>
        </ul>
    </div>

    <div class="main-container">
        <section id="welcome-view">
            <img src="logo_pope.png" style="width: 150px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.4));">
            <div style="border-top: 2px solid #ffc107; border-bottom: 2px solid #ffc107; padding: 15px 0; width: fit-content; min-width: 300px;">
                <h1 style="color: white; line-height: 1.2;">SELAMAT DATANG</h1>
                <h3 style="color: #ffc107;">SISTEM INFORMASI PONDOK PEMULIHAN PAPUA</h3>
            </div>
        </section>

        <div id="input-view" class="hidden">
            <div class="card-form">
                <h2 style="color: #ffc107; margin-bottom: 20px; text-align: center;">FORM INPUT JEMAAT</h2>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama_jemaat" placeholder="Masukkan Nama">
                </div>
                <div class="form-group">
                    <label>Alamat</label>
                    <input type="text" id="alamat_jemaat" placeholder="Masukkan Alamat">
                </div>
                <div class="form-group">
                    <label>Status Pemulihan</label>
                    <select id="status_jemaat">
                        <option value="Aktif">Aktif</option>
                        <option value="Selesai">Selesai</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Foto Jemaat</label>
                    <input type="file" id="foto_input" accept="image/*">
                </div>
                <button class="btn-submit" id="btn-simpan">SIMPAN DATA</button>
                <div id="upload-status" class="status-msg"></div>
            </div>
        </div>

        <div id="database-view" class="hidden">
            <h2 style="color: #ffc107; margin-bottom: 20px;">DATABASE JEMAAT</h2>
            <div id="tabel-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDIZA6rWBJHAjfm_cSoiaZFjc48fSwCQYw",
          authDomain: "sidata-pondok-pemulihan.firebaseapp.com",
          projectId: "sidata-pondok-pemulihan",
          storageBucket: "sidata-pondok-pemulihan.firebasestorage.app",
          messagingSenderId: "244791653787",
          appId: "1:244791653787:web:e66ee6ac264dca643d1d3e",
          measurementId: "G-ZZKNXQZCWJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- NAVIGATION & VIEWS ---
        window.tampilkanView = async (viewId) => {
            const views = ['welcome-view', 'input-view', 'database-view'];
            views.forEach(v => {
                const el = document.getElementById(v);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
            document.getElementById('menu-list').classList.remove('active');
            if (viewId === 'database-view') await muatDatabaseJemaat();
        };

        window.toggleMenu = () => document.getElementById('menu-list').classList.toggle('active');

        // Event Listeners
        document.getElementById('nav-header').onclick = window.toggleMenu;
        document.getElementById('menu-beranda').onclick = () => window.tampilkanView('welcome-view');
        document.getElementById('menu-database').onclick = () => window.tampilkanView('database-view');
        document.getElementById('menu-input').onclick = () => window.tampilkanView('input-view');
        document.getElementById('btn-simpan').onclick = simpanDataJemaat;

        // --- FIREBASE LOGIC ---
        async function simpanDataJemaat() {
            const nama = document.getElementById('nama_jemaat').value;
            const fotoFile = document.getElementById('foto_input').files[0];
            const statusDiv = document.getElementById('upload-status');
            if (!nama || !fotoFile) { alert("Isi Nama & Pilih Foto!"); return; }

            statusDiv.innerText = "Mengunggah...";
            const formData = new FormData();
            formData.append('file', fotoFile);
            formData.append('upload_preset', "sidata_upload");

            try {
                const resp = await fetch(`https://api.cloudinary.com/v1_1/dxzllsbgi/image/upload`, { method: 'POST', body: formData });
                const cloud = await resp.json();
                if (cloud.secure_url) {
                    await addDoc(collection(db, "jemaat"), {
                        nama_lengkap: nama,
                        alamat: document.getElementById('alamat_jemaat').value,
                        status: document.getElementById('status_jemaat').value,
                        foto_url: cloud.secure_url,
                        dibuat_pada: serverTimestamp()
                    });
                    statusDiv.innerHTML = "Berhasil!";
                    document.getElementById('nama_jemaat').value = "";
                    document.getElementById('foto_input').value = "";
                }
            } catch (err) { statusDiv.innerText = "Gagal!"; console.error(err); }
        }

        async function muatDatabaseJemaat() {
            const container = document.getElementById('tabel-container');
            container.innerHTML = "Memuat...";
            try {
                const q = query(collection(db, "jemaat"), orderBy("dibuat_pada", "desc"));
                const snap = await getDocs(q);
                let html = `<table><thead><tr><th>Foto</th><th>Nama</th><th>Alamat</th><th>Status</th><th>Aksi</th></tr></thead><tbody>`;
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    html += `<tr>
                        <td><img src="${data.foto_url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;"></td>
                        <td>${data.nama_lengkap}</td>
                        <td>${data.alamat}</td>
                        <td>${data.status}</td>
                        <td><button onclick="hapusJemaat('${docSnap.id}')" style="background:#e11d48;color:white;border:none;padding:5px;cursor:pointer;"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
                });
                container.innerHTML = html + "</tbody></table>";
            } catch (e) { container.innerHTML = "Gagal memuat."; }
        }

        window.hapusJemaat = async (id) => {
            if(confirm("Hapus data?")) {
                await deleteDoc(doc(db, "jemaat", id));
                muatDatabaseJemaat();
            }
        };
    </script>

    <script>
        // AUTH & UI LOGIC
        const USER_AKSES = "admin_papua";
        const PASS_AKSES = "Papua2026!";

        document.getElementById('togglePassword').onclick = function() {
            const passInput = document.getElementById('password_input');
            const type = passInput.type === 'password' ? 'text' : 'password';
            passInput.type = type;
            this.classList.toggle('fa-eye-slash');
        };

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            if (document.getElementById('username_input').value === USER_AKSES && 
                document.getElementById('password_input').value === PASS_AKSES) {
                document.getElementById('login-overlay').classList.add('hidden');
            } else { alert("Akses Ditolak!"); }
        };

        window.prosesLogout = () => { if(confirm("Keluar?")) location.reload(); };

        function updateWaktu() {
            const now = new Date();
            document.getElementById('display-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('display-clock').innerText = now.toLocaleTimeString('id-ID');
        }
        setInterval(updateWaktu, 1000);
        updateWaktu();
    </script>
</body>
</html>

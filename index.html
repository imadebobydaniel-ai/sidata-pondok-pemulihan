<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        /* RESET & BASE STYLES */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)), url('poster papua.png');
            background-size: cover;
            background-position: center;
        }

        /* LOGIN OVERLAY (Tetap muncul jika belum login) */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100000;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            color: white;
            backdrop-filter: blur(10px);
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: white;
            color: #1e293b;
            border: 2px solid #ffc107;
        }

        /* TOP BAR */
        #top-bar-info {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 80px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 9999;
            color: white;
            border-bottom: 2px solid #ffc107;
        }

        /* NAVIGATION MENU */
        .navigasi-wrapper { position: fixed; top: 100px; left: 30px; z-index: 10006; }
        .navigasi-header { background: #ffc107; color: black; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .menu-content { list-style: none; display: none; background: rgba(0, 0, 0, 0.9); padding: 15px; border-radius: 10px; margin-top: 10px; }
        .menu-content.active { display: flex; flex-direction: column; gap: 10px; }
        .menu-content a { color: white; text-decoration: none; font-size: 14px; }
        .menu-content a:hover { color: #ffc107; }

        .main-container { position: fixed; top: 80px; width: 100%; height: calc(100% - 80px); padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }
        .btn-masuk { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-batal { background: #e11d48; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <img src="logo_pope.png" style="width: 80px; margin-bottom: 20px;">
            <h2 style="color: #ffc107;">PORTAL LOGIN</h2>
            <p style="font-size: 0.8rem; margin-bottom: 20px;">Pondok Pemulihan Papua</p>

            <form id="loginForm">
                <div style="text-align: left;">
                    <label>Username / Admin Kode</label>
                    <input type="text" id="username_input" placeholder="Masukkan Akses" required>
                    <label>Password</label>
                    <input type="password" id="password_input" placeholder="Masukkan Password" required>
                </div>
                <button type="submit" class="btn-masuk">MASUK KE SISTEM</button>
            </form>
        </div>
    </div>

    <div id="top-bar-info">
        <div>
            <p id="display-date">Memuat Tanggal...</p>
            <p id="display-clock" style="font-weight: bold; color: #ffc107;">00:00:00</p>
        </div>
        <h3>PONDOK PEMULIHAN PAPUA</h3>
        <button onclick="prosesLogout()" class="btn-batal">
            <i class="fas fa-sign-out-alt"></i> LOGOUT
        </button>
    </div>

    <div class="navigasi-wrapper">
        <div class="navigasi-header" onclick="toggleMenu()">NAVIGASI PORTAL ▼</div>
        <ul id="menu-list" class="menu-content">
            <li><a href="#" onclick="tampilkanView('welcome-view')">Beranda</a></li>
            <li><a href="#" onclick="tampilkanView('database-view')">Database Jemaat</a></li>
            <li><a href="#" onclick="tampilkanView('input-view')">Input Data Jemaat</a></li>
            <li><hr style="border-color: #333;"></li>
            <li><a href="#" onclick="prosesLogout()">Keluar Sistem</a></li>
        </ul>
    </div>

    <div class="main-container">
        <section id="welcome-view" style="text-align: center; color: white;">
            <img src="Logo pondok pemulihan.png" style="width: 150px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));">
            <h1>SELAMAT DATANG</h1>
            <h3>SISTEM INFORMASI PONDOK PEMULIHAN PAPUA</h3>
        </section>

        <div id="input-view" class="hidden" style="color: white;"><h2>Form Input Jemaat</h2></div>
        <div id="database-view" class="hidden" style="color: white;"><h2>Database Jemaat</h2></div>
    </div>

    <script src="auth.js"></script>
    <script>
        // FUNGSI NAVIGASI TAMPILAN
        function toggleMenu() {
            document.getElementById('menu-list').classList.toggle('active');
        }

        function tampilkanView(viewId) {
            const views = ['welcome-view', 'input-view', 'database-view'];
            views.forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            document.getElementById('menu-list').classList.remove('active');
        }

        // UPDATE JAM & TANGGAL
        function updateWaktu() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('display-date').innerText = now.toLocaleDateString('id-ID', options);
            
            const jam = String(now.getHours()).padStart(2, '0');
            const menit = String(now.getMinutes()).padStart(2, '0');
            const detik = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('display-clock').innerText = `${jam}:${menit}:${detik}`;
        }
        setInterval(updateWaktu, 1000);
        updateWaktu();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        /* RESET & BASE STYLES */
        * { box-sizing: border-box; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            margin: 0;
            /* CSS BACKGROUND & PADDING DIHAPUS */
            color: black; 
        }

        /* Layer degradasi dihapus background-nya */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        #top-bar-info, .navigasi-wrapper, .main-container {
            position: relative;
            z-index: 10;
        }

        /* LOGIN OVERLAY */
        #login-overlay { 
            position: fixed; 
            inset: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 100000; 
        }

        .login-card { 
            border-radius: 15px; 
            border: 1px solid #ccc; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            color: black; 
            /* PADDING & BACKGROUND DIHAPUS */
        }

        .login-card input { 
            width: 100%; 
            margin-top: 5px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            color: #1e293b; 
            border: 2px solid #ffc107; 
            /* PADDING & BACKGROUND DIHAPUS */
        }

        /* TOP BAR */
        #top-bar-info { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 80px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 2px solid #ffc107; 
            /* PADDING & BACKGROUND DIHAPUS */
        }

        /* NAVIGATION MENU */
        .navigasi-wrapper { position: fixed; top: 100px; left: 30px; z-index: 10006; }
        .navigasi-header { color: black; border-radius: 5px; cursor: pointer; font-weight: bold; border: 1px solid #000; }
        .menu-content { list-style: none; display: none; border-radius: 10px; margin-top: 10px; border: 1px solid #000; }
        .menu-content.active { display: flex; flex-direction: column; gap: 10px; }
        .menu-content a { color: black; text-decoration: none; font-size: 14px; }

        .main-container { 
            position: fixed; 
            top: 80px; 
            width: 100%; 
            height: calc(100% - 80px); 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            /* PADDING DIHAPUS */
        }
        
        .hidden { display: none !important; }
        .btn-masuk { color: black; border: 1px solid #000; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-batal { color: black; border: 1px solid #000; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <img src="logo_pope.png" style="width: 80px; margin-bottom: 20px;">
            <h2>PORTAL LOGIN</h2>
            <p style="font-size: 0.8rem; margin-bottom: 20px;">Pondok Pemulihan Papua</p>

            <form id="loginForm">
                <div style="text-align: left;">
                    <label>Username / Admin Kode</label>
                    <input type="text" id="username_input" placeholder="Masukkan Akses" required>
                    <label>Password</label>
                    <input type="password" id="password_input" placeholder="Masukkan Password" required>
                </div>
                <button type="submit" class="btn-masuk">MASUK KE SISTEM</button>
            </form>
        </div>
    </div>

    <div id="top-bar-info">
        <div>
            <p id="display-date">Memuat Tanggal...</p>
            <p id="display-clock" style="font-weight: bold;">00:00:00</p>
        </div>
        <h3>PONDOK PEMULIHAN PAPUA</h3>
        <button onclick="prosesLogout()" class="btn-batal">
            <i class="fas fa-sign-out-alt"></i> LOGOUT
        </button>
    </div>

    <div class="navigasi-wrapper">
        <div class="navigasi-header" onclick="toggleMenu()">NAVIGASI PORTAL ▼</div>
        <ul id="menu-list" class="menu-content">
            <li><a href="#" onclick="tampilkanView('welcome-view')">Beranda</a></li>
            <li><a href="#" onclick="tampilkanView('database-view')">Database Jemaat</a></li>
            <li><a href="#" onclick="tampilkanView('input-view')">Input Data Jemaat</a></li>
            <li><hr style="border-color: #333;"></li>
            <li><a href="#" onclick="prosesLogout()">Keluar Sistem</a></li>
        </ul>
    </div>

    <div class="main-container">
        <section id="welcome-view" style="text-align: center; color: black;">
            <img src="logo_pope.png" style="width: 150px; height: auto; margin-bottom: 25px; display: block; margin-left: auto; margin-right: auto;">
            <h1>SELAMAT DATANG</h1>
            <h3>SISTEM INFORMASI PONDOK PEMULIHAN PAPUA</h3>
        </section>

        <div id="input-view" class="hidden" style="color: black;"><h2>Form Input Jemaat</h2></div>
        <div id="database-view" class="hidden" style="color: black;"><h2>Database Jemaat</h2></div>
    </div>

    <script src="auth.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('menu-list').classList.toggle('active');
        }

        function tampilkanView(viewId) {
            const views = ['welcome-view', 'input-view', 'database-view'];
            views.forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            document.getElementById('menu-list').classList.remove('active');
        }

        function updateWaktu() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('display-date').innerText = now.toLocaleDateString('id-ID', options);
            
            const jam = String(now.getHours()).padStart(2, '0');
            const menit = String(now.getMinutes()).padStart(2, '0');
            const detik = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('display-clock').innerText = `${jam}:${menit}:${detik}`;
        }
        setInterval(updateWaktu, 1000);
        updateWaktu();
    </script>
</body>
</html>

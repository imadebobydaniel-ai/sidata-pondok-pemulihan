<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Unit Baru - Administrator JAYA MOBIL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --input-bg: #222;
            --text-light: #f4f4f4;
            --green: #2ecc71;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background: #000;
            padding: 20px;
            border-right: 1px solid #222;
            position: fixed;
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: 100%;
        }

        .form-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            max-width: 800px;
            border: 1px solid #333;
        }

        h2 { color: var(--gold); margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #bbb; font-size: 14px; }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .preview-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .preview-item {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #444;
        }

        .btn-simpan {
            background: var(--green);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }

        .spec-box {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--gold);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="color:var(--gold)">JAYA MOBIL</h3>
    <p style="font-size: 12px; color: #666;">ADMINISTRATOR</p>
    <hr border="0" style="border-top:1px solid #222; margin: 20px 0;">
    <a href="admin-jaya.html" style="color:white; text-decoration:none;"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
</div>

<div class="main-content">
    <div class="form-container">
        <h2><i class="fas fa-plus-circle"></i> Tambah Unit Mobil</h2>
        
        <form id="formTambahMobil">
            <div class="form-group">
                <label>Foto-foto Mobil (Bisa pilih banyak sekaligus)</label>
                <input type="file" id="fotoMobil" accept="image/jpeg, image/png" multiple onchange="previewImages(event)">
                <div id="galleryPreview" class="preview-gallery"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Jenis Mobil</label>
                    <select id="jenisMobil" onchange="updateMerek()">
                        <option value="">-- Pilih Jenis --</option>
                        <option value="Sedan">Sedan</option>
                        <option value="SUV">SUV</option>
                        <option value="Sport">Sport</option>
                        <option value="MPV">MPV</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Merek Mobil</label>
                    <select id="merekMobil" onchange="updateSpecs()" disabled>
                        <option value="">-- Pilih Merek --</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Spesifikasi (Otomatis)</label>
                <div id="specsOutput" class="spec-box">Pilih jenis dan merek untuk melihat spesifikasi standar.</div>
                <input type="hidden" id="spesifikasiHidden">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Tahun Mobil</label>
                    <select id="tahunMobil"></select>
                </div>

                <div class="form-group">
                    <label>Harga (Input angka saja)</label>
                    <input type="text" id="hargaInput" placeholder="Contoh: 2500000000" oninput="formatRupiah(this)">
                    <p id="formattedHarga" style="font-size: 12px; color: var(--gold); margin-top: 5px;">Rp 0</p>
                </div>
            </div>

            <button type="button" class="btn-simpan" onclick="simpanUnit()">
                <i class="fas fa-save"></i> SIMPAN UNIT KE KATALOG
            </button>
        </form>
    </div>
</div>

<script>
    let uploadedImages = [];

    // 1. PREVIEW MULTI GAMBAR
    function previewImages(event) {
        const previewContainer = document.getElementById('galleryPreview');
        previewContainer.innerHTML = ""; 
        uploadedImages = []; 
        
        const files = event.target.files;
        if (files) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.classList.add('preview-item');
                    previewContainer.appendChild(img);
                    uploadedImages.push(e.target.result);
                };
                reader.readAsDataURL(file);
            });
        }
    }

    // 2. GENERATE TAHUN
    const selectTahun = document.getElementById('tahunMobil');
    const currentYear = new Date().getFullYear();
    for (let i = currentYear; i >= currentYear - 20; i--) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = i;
        selectTahun.appendChild(opt);
    }

    // 3. FUNGSI UPDATE MEREK (API VERSION)
    async function updateMerek() {
        const jenis = document.getElementById('jenisMobil').value;
        const merekSelect = document.getElementById('merekMobil');
        
        // Reset dan tampilkan status loading
        merekSelect.innerHTML = '<option value="">-- Meload Data... --</option>';
        
        if (!jenis) {
            merekSelect.disabled = true;
            merekSelect.innerHTML = '<option value="">-- Pilih Jenis Dahulu --</option>';
            return;
        }

        try {
            // GANTI URL INI dengan endpoint API asli kamu
            // Contoh: fetch(`https://api.jayamobil.com/merek?jenis=${jenis}`)
            const response = await fetch(`https://api.jayamobil.com/merek?jenis=${jenis}`);
            const data = await response.json();

            merekSelect.innerHTML = '<option value="">-- Pilih Merek --</option>';
            merekSelect.disabled = false;

            // Pastikan struktur JSON API kamu adalah Array of Objects: [{nama: "Civic", spek: "..."}, ...]
            data.forEach(merek => {
                let opt = document.createElement('option');
                opt.value = merek.nama; 
                opt.innerHTML = merek.nama;
                // Simpan spek di dataset agar bisa diambil saat updateSpecs()
                opt.dataset.spec = merek.deskripsi || "Spesifikasi standar tersedia."; 
                merekSelect.appendChild(opt);
            });
        } catch (error) {
            console.error("Gagal mengambil data API:", error);
            // Fallback jika API gagal (untuk testing)
            merekSelect.innerHTML = '<option value="">-- Error Memuat Data --</option>';
            alert("Gagal memuat daftar merek dari server.");
        }
    }

    // 4. UPDATE SPECS (Diambil dari atribut data di option)
    function updateSpecs() {
        const merekSelect = document.getElementById('merekMobil');
        const selectedOption = merekSelect.options[merekSelect.selectedIndex];
        const output = document.getElementById('specsOutput');
        
        if (selectedOption && selectedOption.dataset.spec) {
            const specText = selectedOption.dataset.spec;
            output.innerHTML = specText;
            document.getElementById('spesifikasiHidden').value = specText;
        }
    }

    function formatRupiah(input) {
        let value = input.value.replace(/\D/g, "");
        input.value = value;
        let formatted = new Intl.NumberFormat('id-ID', {
            style: 'currency', currency: 'IDR', minimumFractionDigits: 0
        }).format(value || 0);
        document.getElementById('formattedHarga').innerText = formatted;
    }

    // 5. SIMPAN DATA
    function simpanUnit() {
        const unitBaru = {
            name: document.getElementById('merekMobil').value,
            price: document.getElementById('formattedHarga').innerText.replace("Rp", "").trim(),
            images: uploadedImages, 
            year: document.getElementById('tahunMobil').value,
            spec: document.getElementById('spesifikasiHidden').value
        };

        if(!unitBaru.name || uploadedImages.length === 0) {
            alert("Harap pilih merek dan minimal satu foto!");
            return;
        }

        let stokLama = JSON.parse(localStorage.getItem('car_stok')) || [];
        stokLama.push(unitBaru);
        localStorage.setItem('car_stok', JSON.stringify(stokLama));
        
        alert("Berhasil! Unit " + unitBaru.name + " telah disimpan.");
        window.location.href = "admin-jaya.html";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Unit Baru - Administrator JAYA MOBIL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --input-bg: #222;
            --text-light: #f4f4f4;
            --green: #2ecc71;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
        }

        /* Sidebar Styling Sederhana */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #000;
            padding: 20px;
            border-right: 1px solid #222;
            position: fixed;
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: 100%;
        }

        .form-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            max-width: 800px;
            border: 1px solid #333;
        }

        h2 { color: var(--gold); margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #bbb; font-size: 14px; }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus { border-color: var(--gold); }

        .preview-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            border: 2px dashed #444;
        }

        .btn-simpan {
            background: var(--green);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-simpan:hover { opacity: 0.8; transform: translateY(-2px); }

        .spec-box {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--gold);
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="color:var(--gold)">JAYA MOBIL</h3>
    <p style="font-size: 12px; color: #666;">ADMINISTRATOR</p>
    <hr border="0" style="border-top:1px solid #222; margin: 20px 0;">
    <a href="admin-jaya.html" style="color:white; text-decoration:none;"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
</div>

<div class="main-content">
    <div class="form-container">
        <h2><i class="fas fa-plus-circle"></i> Tambah Unit Mobil</h2>
        
        <form id="formTambahMobil">
            <div class="form-group">
                <label>Foto Mobil (JPG/PNG)</label>
                <input type="file" id="fotoMobil" accept="image/jpeg, image/png" onchange="previewImage(event)">
                <img id="imgPreview" class="preview-img">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Jenis Mobil</label>
                    <select id="jenisMobil" onchange="updateMerek()">
                        <option value="">-- Pilih Jenis --</option>
                        <option value="Sedan">Sedan</option>
                        <option value="SUV">SUV</option>
                        <option value="Sport">Sport</option>
                        <option value="MPV">MPV</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Merek Mobil</label>
                    <select id="merekMobil" onchange="updateSpecs()" disabled>
                        <option value="">-- Pilih Merek --</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Spesifikasi (Otomatis)</label>
                <div id="specsOutput" class="spec-box">Pilih jenis dan merek untuk melihat spesifikasi standar.</div>
                <input type="hidden" id="spesifikasiHidden">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Tahun Mobil</label>
                    <select id="tahunMobil">
                        </select>
                </div>

                <div class="form-group">
                    <label>Harga (Input angka saja)</label>
                    <input type="text" id="hargaInput" placeholder="Contoh: 2500000000" oninput="formatRupiah(this)">
                    <p id="formattedHarga" style="font-size: 12px; color: var(--gold); margin-top: 5px;">Rp 0</p>
                </div>
            </div>

            <button type="button" class="btn-simpan" onclick="simpanUnit()">
                <i class="fas fa-save"></i> SIMPAN UNIT KE KATALOG
            </button>
        </form>
    </div>
</div>

<script>
    // 1. DATA SIMULASI API (Katalog Data)
    const carData = {
        "Sedan": {
            "Honda Civic RS": "Mesin 1.5L VTEC Turbo, 178 PS, Honda Sensing, Interior Leather.",
            "Toyota Camry": "Mesin 2.5L A25A-FKS, Transmisi Otomatis 8-Speed, Mewah & Elegan.",
            "BMW 320i": "Mesin 2.0L TwinPower Turbo, RWD, iDrive 7.0, Sporty Luxury."
        },
        "SUV": {
            "Pajero Sport": "Mesin 2.4L MIVEC Turbo Diesel, 181 PS, 4x2/4x4, Tangguh di segala medan.",
            "Toyota Fortuner": "Mesin 2.8L Diesel, Power 203 PS, Fitur Keamanan Lengkap.",
            "Honda CR-V": "Mesin 1.5L Turbo, 7 Seater, Panoramic Sunroof."
        },
        "Sport": {
            "Porsche 911": "Mesin 3.0L Flat-6 Twin-Turbo, Akselerasi 0-100 km/j dalam 3.4 detik.",
            "Toyota GR Supra": "Mesin 3.0L Inline-6, 340 HP, Hasil kolaborasi legendaris.",
            "BMW M4": "Mesin M TwinPower Turbo, 510 HP, Carbon Fiber Roof."
        }
    };

    // 2. GENERATE TAHUN (20 Tahun Terakhir)
    const selectTahun = document.getElementById('tahunMobil');
    const currentYear = new Date().getFullYear();
    for (let i = currentYear; i >= currentYear - 20; i--) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i;
        selectTahun.appendChild(opt);
    }

    // 3. LOGIKA DROPDOWN OTOMATIS
    function updateMerek() {
        const jenis = document.getElementById('jenisMobil').value;
        const merekSelect = document.getElementById('merekMobil');
        merekSelect.innerHTML = '<option value="">-- Pilih Merek --</option>';
        
        if (jenis && carData[jenis]) {
            merekSelect.disabled = false;
            Object.keys(carData[jenis]).forEach(merek => {
                let opt = document.createElement('option');
                opt.value = merek;
                opt.innerHTML = merek;
                merekSelect.appendChild(opt);
            });
        } else {
            merekSelect.disabled = true;
        }
    }

    function updateSpecs() {
        const jenis = document.getElementById('jenisMobil').value;
        const merek = document.getElementById('merekMobil').value;
        const output = document.getElementById('specsOutput');
        
        if (merek && carData[jenis][merek]) {
            const specText = carData[jenis][merek];
            output.innerHTML = specText;
            document.getElementById('spesifikasiHidden').value = specText;
        }
    }

    // 4. FORMAT HARGA RUPIAH
    function formatRupiah(input) {
        let value = input.value.replace(/\D/g, "");
        input.value = value;
        let formatted = new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0
        }).format(value);
        document.getElementById('formattedHarga').innerText = formatted;
    }

    // 5. PREVIEW GAMBAR
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function(){
            const output = document.getElementById('imgPreview');
            output.src = reader.result;
            output.style.display = 'block';
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    // 6. SIMPAN DATA (Local Storage)
    function simpanUnit() {
        const unitBaru = {
            name: document.getElementById('merekMobil').value,
            price: document.getElementById('formattedHarga').innerText.replace("Rp", ""),
            img: document.getElementById('imgPreview').src,
            year: document.getElementById('tahunMobil').value,
            spec: document.getElementById('spesifikasiHidden').value
        };

        if(!unitBaru.name || !unitBaru.price || unitBaru.price == " 0") {
            alert("Harap lengkapi semua data!");
            return;
        }

        // Ambil data lama
        let stokLama = JSON.parse(localStorage.getItem('car_stok')) || [];
        stokLama.push(unitBaru);
        
        // Simpan kembali
        localStorage.setItem('car_stok', JSON.stringify(stokLama));
        
        alert("Unit Berhasil Ditambahkan ke Katalog!");
        window.location.href = "admin-jaya.html";
    }
</script>

</body>
</html>

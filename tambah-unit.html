<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Unit Baru - Administrator JAYA MOBIL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --input-bg: #222;
            --text-light: #f4f4f4;
            --green: #2ecc71;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background: #000;
            padding: 20px;
            border-right: 1px solid #222;
            position: fixed;
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: 100%;
        }

        .form-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            max-width: 800px;
            border: 1px solid #333;
        }

        h2 { color: var(--gold); margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #bbb; font-size: 14px; }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .preview-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .preview-item {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #444;
        }

        .btn-simpan {
            background: var(--green);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }

        .spec-box {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--gold);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="color:var(--gold)">JAYA MOBIL</h3>
    <p style="font-size: 12px; color: #666;">ADMINISTRATOR</p>
    <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">
    <a href="admin-jaya.html" style="color:white; text-decoration:none;"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
</div>

<div class="main-content">
    <div class="form-container">
        <h2><i class="fas fa-plus-circle"></i> Tambah Unit Mobil</h2>
        
        <form id="formTambahMobil">
            <div class="form-group">
                <label>Foto-foto Mobil (Pilih minimal satu)</label>
                <input type="file" id="fotoMobil" accept="image/jpeg, image/png" multiple onchange="previewImages(event)">
                <div id="galleryPreview" class="preview-gallery"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Jenis Mobil</label>
                    <select id="jenisMobil" onchange="updateMerek()">
                        <option value="">-- Pilih Jenis --</option>
                        <option value="MPV">MPV (Multi Purpose Vehicle)</option>
                        <option value="SUV">SUV (Sport Utility Vehicle)</option>
                        <option value="LCGC">LCGC (Low Cost Green Car)</option>
                        <option value="City Car">City Car / Hatchback</option>
                        <option value="Sedan">Sedan</option>
                        <option value="DCab">Double Cabin (DCab)</option>
                        <option value="EV">Mobil Listrik (EV)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Merek/Model Mobil</label>
                    <select id="merekMobil" onchange="updateSpecs()" disabled>
                        <option value="">-- Pilih Merek --</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Spesifikasi (Otomatis)</label>
                <div id="specsOutput" class="spec-box">Pilih jenis dan merek untuk melihat spesifikasi standar.</div>
                <input type="hidden" id="spesifikasiHidden">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Tahun Mobil</label>
                    <select id="tahunMobil"></select>
                </div>

                <div class="form-group">
                    <label>Harga (Input angka saja)</label>
                    <input type="text" id="hargaInput" placeholder="Contoh: 250000000" oninput="formatRupiah(this)">
                    <p id="formattedHarga" style="font-size: 12px; color: var(--gold); margin-top: 5px;">Rp 0</p>
                </div>
            </div>

            <button type="button" class="btn-simpan" onclick="simpanUnit()">
                <i class="fas fa-save"></i> SIMPAN UNIT KE KATALOG
            </button>
        </form>
    </div>
</div>

<script>
    let uploadedImages = [];

    // Fungsi Preview dan konversi ke Base64
    function previewImages(event) {
        const previewContainer = document.getElementById('galleryPreview');
        previewContainer.innerHTML = ""; 
        uploadedImages = []; 
        
        const files = event.target.files;
        if (files) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.classList.add('preview-item');
                    previewContainer.appendChild(img);
                    // Simpan string Base64 ke array
                    uploadedImages.push(e.target.result);
                };
                reader.readAsDataURL(file);
            });
        }
    }

    // Load Pilihan Tahun
    const selectTahun = document.getElementById('tahunMobil');
    const currentYear = new Date().getFullYear();
    for (let i = currentYear; i >= currentYear - 20; i--) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = i;
        selectTahun.appendChild(opt);
    }

    const carData = {
        "MPV": [
            {nama: "Toyota Avanza", deskripsi: "Mesin 1.5L Dual VVT-i, Kapasitas 7 Penumpang."},
            {nama: "Toyota Innova", deskripsi: "Mesin 2.0L / 2.4L Diesel, Interior Mewah."},
            {nama: "Daihatsu Xenia", deskripsi: "Mesin 1.3L / 1.5L, Irit bahan bakar."}
        ],
        "SUV": [
            {nama: "Toyota Fortuner", deskripsi: "Mesin 2.8L Diesel, 4x2 / 4x4, Gagah & Tangguh."},
            {nama: "Mitsubishi Pajero Sport", deskripsi: "Mesin 2.4L MIVEC Turbo Diesel, Fitur Canggih."},
            {nama: "Honda HR-V", deskripsi: "Mesin 1.5L i-VTEC, Desain Sporty & Compact SUV."}
        ],
        "LCGC": [
            {nama: "Toyota Agya", deskripsi: "Mesin 1.2L, Sangat Irit, Cocok untuk Perkotaan."},
            {nama: "Daihatsu Ayla", deskripsi: "Mesin 1.0L / 1.2L, Harga Terjangkau."},
            {nama: "Honda Brio Satya", deskripsi: "Mesin 1.2L i-VTEC, Performa Terbaik di Kelasnya."}
        ],
        "City Car": [
            {nama: "Honda Brio RS", deskripsi: "Mesin 1.2L, Sporty Look, Handling Lincah."},
            {nama: "Suzuki Ignis", deskripsi: "Urban SUV Style, Irit & Ground Clearance Tinggi."},
            {nama: "Toyota Yaris", deskripsi: "Mesin 1.5L, Hatchback Premium, Fitur Keamanan Lengkap."},
            {nama: "Suzuki Baleno", deskripsi: "Liquid Flow Design, Interior Luas & Nyaman."}
        ],
        "Sedan": [
            {nama: "Toyota Camry", deskripsi: "Mesin 2.5L, Sedan Mewah & Elegan."},
            {nama: "Honda Civic", deskripsi: "Mesin 1.5L VTEC Turbo, Performa Sporty."}
        ],
        "DCab": [
            {nama: "Toyota Hilux", deskripsi: "Pickup Penumpang 4x4, Tangguh untuk Medan Berat."},
            {nama: "Mitsubishi Triton", deskripsi: "Mesin 2.4L Turbo Diesel, Kombinasi Kerja & Gaya."}
        ],
        "EV": [
            {nama: "Wuling Air EV", deskripsi: "Compact Electric Vehicle, Jarak Tempuh hingga 300km."},
            {nama: "Hyundai Ioniq 5", deskripsi: "Electric Global Modular Platform (E-GMP), Ultra Fast Charging."},
            {nama: "MG 4 EV", deskripsi: "Crossover Listrik, Desain Futuristik."},
            {nama: "Chery Omoda E5", deskripsi: "Intelligent Electric SUV, Fitur ADAS Lengkap."}
        ]
    };

    function updateMerek() {
        const jenis = document.getElementById('jenisMobil').value;
        const merekSelect = document.getElementById('merekMobil');
        merekSelect.innerHTML = '<option value="">-- Pilih Merek --</option>';

        if (jenis && carData[jenis]) {
            merekSelect.disabled = false;
            carData[jenis].forEach(merek => {
                let opt = document.createElement('option');
                opt.value = merek.nama;
                opt.innerHTML = merek.nama;
                opt.dataset.spec = merek.deskripsi;
                merekSelect.appendChild(opt);
            });
        } else {
            merekSelect.disabled = true;
        }
        document.getElementById('specsOutput').innerHTML = "Pilih merek untuk melihat spesifikasi standar.";
    }

    function updateSpecs() {
        const merekSelect = document.getElementById('merekMobil');
        const selectedOption = merekSelect.options[merekSelect.selectedIndex];
        if (selectedOption && selectedOption.dataset.spec) {
            const specText = selectedOption.dataset.spec;
            document.getElementById('specsOutput').innerHTML = specText;
            document.getElementById('spesifikasiHidden').value = specText;
        }
    }

    function formatRupiah(input) {
        let value = input.value.replace(/\D/g, "");
        input.value = value;
        let formatted = new Intl.NumberFormat('id-ID', {
            style: 'currency', currency: 'IDR', minimumFractionDigits: 0
        }).format(value || 0);
        document.getElementById('formattedHarga').innerText = formatted;
    }

    function simpanUnit() {
        const namaMobil = document.getElementById('merekMobil').value;
        const hargaTeks = document.getElementById('formattedHarga').innerText;
        const tahun = document.getElementById('tahunMobil').value;
        const spek = document.getElementById('spesifikasiHidden').value;
        const jenis = document.getElementById('jenisMobil').value;

        // Validasi minimal
        if(!namaMobil || uploadedImages.length === 0) {
            alert("Mohon lengkapi Merek Mobil dan pilih minimal satu foto!");
            return;
        }

        const unitBaru = {
            type: jenis,
            name: namaMobil,
            price: hargaTeks,
            img: uploadedImages[0], // Foto utama
            images: uploadedImages, // Semua foto
            year: tahun,
            spec: spek,
            fuel: "Bensin"
        };

        try {
            let stok = JSON.parse(localStorage.getItem('car_stok')) || [];
            stok.push(unitBaru);
            localStorage.setItem('car_stok', JSON.stringify(stok));
            
            alert("Berhasil! Unit " + namaMobil + " telah disimpan.");
            window.location.href = "admin-jaya.html";
        } catch (e) {
            alert("Gagal menyimpan! Ukuran foto mungkin terlalu besar untuk memori browser.");
            console.error(e);
        }
    }
</script>
</body>
</html>

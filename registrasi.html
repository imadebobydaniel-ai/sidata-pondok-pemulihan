<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Jemaat - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffc107; --bg: #0f172a; --card: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('poster_papua.jpg');
            background-size: cover; background-attachment: fixed;
            color: white; display: flex; justify-content: center; padding: 20px;
        }

        .reg-container { width: 100%; max-width: 800px; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header img { width: 100px; margin-bottom: 10px; }
        .header h2 { color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        .form-section { border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; padding-bottom: 15px; }
        .section-title { color: var(--primary); font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #cbd5e1; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; 
            background: #0f172a; color: white; outline: none; font-size: 1rem;
        }
        input:focus { border-color: var(--primary); }

        .radio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; }
        .radio-item input { width: auto; }

        .child-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        
        .btn-submit { 
            background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; 
            border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        .btn-submit:hover { background: #eab308; transform: translateY(-2px); }

        .hidden { display: none !important; }
        #success-msg { text-align: center; padding: 50px 20px; }
    </style>
</head>
<body>

<div class="reg-container" id="form-wrapper">
    <div class="header">
        <img src="logo_pope.png" alt="Logo">
        <h2>Form Pendataan Jemaat</h2>
        <p>Pondok Pemulihan Papua</p>
    </div>

    <form id="mainForm">
        <div class="form-section">
            <div class="section-title"><i class="fas fa-user"></i> Identitas Pribadi</div>
            <div class="form-group">
                <label>Nama Lengkap (Sesuai KTP) *</label>
                <input type="text" id="nama_lengkap" required>
            </div>
            <div class="form-group">
                <label>Alamat Sesuai KTP</label>
                <input type="text" id="alamat_ktp">
            </div>
            <div class="form-group">
                <label>Alamat Domisili Sekarang</label>
                <input type="text" id="alamat_domisili">
            </div>
            <div class="form-group">
                <label>Status Pernikahan</label>
                <div class="radio-grid">
                    <label class="radio-item"><input type="radio" name="st_nikah" value="Menikah"> Menikah</label>
                    <label class="radio-item"><input type="radio" name="st_nikah" value="Duda (Cerai Mati)"> Duda (Mati)</label>
                    <label class="radio-item"><input type="radio" name="st_nikah" value="Duda (Cerai Hidup)"> Duda (Hidup)</label>
                    <label class="radio-item"><input type="radio" name="st_nikah" value="Janda (Cerai Mati)"> Janda (Mati)</label>
                    <label class="radio-item"><input type="radio" name="st_nikah" value="Relationship"> Relationship</label>
                    <label class="radio-item"><input type="radio" name="st_nikah" value="Single"> Single</label>
                </div>
            </div>
            <div class="form-group">
                <label>Nama Suami / Istri (Pilih Salah Satu)</label>
                <select id="tipe_pasangan">
                    <option value="">-- Tidak Ada / Belum --</option>
                    <option value="Suami">Suami</option>
                    <option value="Istri">Istri</option>
                </select>
                <input type="text" id="nama_pasangan" placeholder="Ketik Nama Pasangan..." style="margin-top:8px;">
            </div>
        </div>

        <div class="form-section">
            <div class="section-title"><i class="fas fa-id-card"></i> Data Legal & Pekerjaan</div>
            <div class="child-grid">
                <div class="form-group"><label>NIK KTP</label><input type="number" id="nik_ktp"></div>
                <div class="form-group"><label>NIK KK</label><input type="number" id="nik_kk"></div>
                <div class="form-group"><label>Provinsi Lahir</label><input type="text" id="prov_lahir"></div>
                <div class="form-group"><label>Kota Lahir</label><input type="text" id="kota_lahir"></div>
            </div>
            <div class="form-group">
                <label>Pekerjaan *</label>
                <select id="pekerjaan" required>
                    <option value="">-- Pilih Pekerjaan --</option>
                    <option>TNI</option><option>Polri</option><option>ASN</option><option>P3K</option>
                    <option>Honorer</option><option>Swasta</option><option>Wiraswasta</option>
                    <option>Profesional</option><option>Guru</option><option>Dosen</option>
                    <option>Pejabat Publik</option><option>Pejabat Eksekutif</option><option>Bidang Kerohaniaan</option>
                </select>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title"><i class="fas fa-users"></i> Anggota Keluarga</div>
            <div class="form-group">
                <label>Jumlah Anak</label>
                <input type="number" id="jml_anak" min="0" value="0" onchange="generateAnak(this.value)">
            </div>
            <div id="anak_container" class="child-grid"></div>
            <div class="form-group" style="margin-top:15px;">
                <label>Total Orang Tinggal Serumah</label>
                <input type="number" id="total_serumah">
            </div>
            <div class="form-group">
                <label>Golongan Darah</label>
                <select id="gol_darah">
                    <option>O</option><option>A</option><option>B</option><option>AB</option><option>AB+</option>
                </select>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title"><i class="fas fa-phone"></i> Kontak & Keanggotaan</div>
            <div class="form-group"><label>No. WhatsApp</label><input type="tel" id="no_wa" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="email"></div>
            <div class="form-group"><label>No. Darurat (Keluarga)</label><input type="tel" id="no_darurat"></div>
            
            <div class="form-group">
                <label>Status Keanggotaan</label>
                <div class="radio-grid">
                    <label class="radio-item"><input type="radio" name="st_aktif" value="Aktif"> Jemaat Aktif</label>
                    <label class="radio-item"><input type="radio" name="st_aktif" value="Tidak Aktif"> Tidak Aktif</label>
                </div>
            </div>

            <div class="form-group">
                <label>Jabatan Pelayanan</label>
                <select id="jabatan" onchange="updateSub(this.value)">
                    <option value="Jemaat Ordinari">Jemaat Ordinari (Belum Melayani)</option>
                    <option value="PKS Komsel">PKS Komsel</option>
                    <option value="Koordinator">Koordinator / Pemimpin</option>
                    <option value="Musik">Bidang Pelayanan Musik</option>
                    <option value="Vocal">Vocal & Singers</option>
                    <option value="Multimedia">Multimedia</option>
                    <option value="Sound">Sound & Elektrikal</option>
                    <option value="Tamborin">Tamborin & Flags</option>
                    <option value="User">User / Front Desk</option>
                    <option value="Syafaat">Pendoa Syafaat</option>
                    <option value="Misi">Bidang Misi (R&D)</option>
                    <option value="Parkir">Perparkiran & Keamanan</option>
                </select>
            </div>

            <div id="sub_div" class="form-group hidden">
                <label id="sub_label">Spesialisasi Pelayanan</label>
                <select id="sub_pelayanan"></select>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="btnSimpan">KIRIM DATA SAYA</button>
    </form>
</div>

<div id="success-msg" class="hidden">
    <i class="fas fa-check-circle" style="font-size: 5rem; color: #22c55e;"></i>
    <h2 style="margin-top:20px;">Data Berhasil Terkirim!</h2>
    <p style="color: #cbd5e1; margin-top:10px;">Terima kasih telah melakukan pemutakhiran data Jemaat Pondok Pemulihan Papua. Tuhan Yesus Memberkati.</p>
    <button onclick="location.reload()" style="margin-top:30px; background:none; border:1px solid var(--primary); color:var(--primary); padding:10px 20px; border-radius:8px; cursor:pointer;">Isi Form Lainnya</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Gunakan Config Firebase Mas yang tadi
    const firebaseConfig = {
        apiKey: "AIzaSyDIZA6rWBJHAjfm_cSoiaZFjc48fSwCQYw",
        authDomain: "sidata-pondok-pemulihan.firebaseapp.com",
        projectId: "sidata-pondok-pemulihan",
        storageBucket: "sidata-pondok-pemulihan.firebasestorage.app",
        messagingSenderId: "244791653787",
        appId: "1:244791653787:web:e66ee6ac264dca643d1d3e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Fungsi Generate Input Anak
    window.generateAnak = (n) => {
        const container = document.getElementById('anak_container');
        container.innerHTML = '';
        for(let i=1; i<=n; i++) {
            container.innerHTML += `<input type="text" class="nama-anak" placeholder="Nama Anak ke-${i}">`;
        }
    };

    // Fungsi Sub Pelayanan (Copy dari logic sebelumnya)
    window.updateSub = (val) => {
        const div = document.getElementById('sub_div');
        const sel = document.getElementById('sub_pelayanan');
        const data = {
            "PKS Komsel": ["Fulltimer", "PKS Komsel Lansia", "PKS Komsel Bapak", "PKS Komsel IBU", "PKS Komsel Profesi", "PKS Komsel mahasiswa", "PKS Komsel Pelajar", "PKS Komsel Remaja", "PKS Komsel Anak Sekolah Minggu"],
            "Koordinator": ["Koordinator Lansia", "Koordinator Bapak", "Koordinator Ibu", "Koordinator profesi", "Koordinator Mahasiswa", "Koordinator Pelajar", "Koordinator Remaja", "Koordinator Sekolah Minggu"],
            "Musik": ["Drumer", "Lead Gitar", "Bass Guitar", "Keyboard", "Saxophone", "Violine", "Trombon"],
            "Vocal": ["Vocal Coach", "Worship Leader", "Singers", "Choirs Team"],
            "Multimedia": ["Director Media", "Campers", "Easy Worship Operator", "Video Stream Operator"],
            "Sound": ["Audio Mixer Operator", "Sound Engineering", "Electrical Engineering"],
            "Tamborin": ["Tamborin Coach", "Flag Coach", "Player"],
            "User": ["Front Desk User", "User Direct", "General Affairs"],
            "Syafaat": ["Penjaga Menara Doa", "Pendoa Syafaat"],
            "Misi": ["Research & Development", "Humas", "Fundraising"],
            "Parkir": ["Park Chief", "Park Crew", "Security"]
        };

        if(data[val]) {
            div.classList.remove('hidden');
            sel.innerHTML = data[val].map(s => `<option value="${s}">${s}</option>`).join('');
        } else {
            div.classList.add('hidden');
        }
    };

    // HANDLE SUBMIT
    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSimpan');
        btn.innerText = "MENGIRIM...";
        btn.disabled = true;

        try {
            const anakElements = document.querySelectorAll('.nama-anak');
            const daftarAnak = Array.from(anakElements).map(el => el.value);

            const payload = {
                nama_lengkap: document.getElementById('nama_lengkap').value,
                alamat_ktp: document.getElementById('alamat_ktp').value,
                nik_ktp: document.getElementById('nik_ktp').value,
                pekerjaan: document.getElementById('pekerjaan').value,
                wa: document.getElementById('no_wa').value,
                daftar_anak: daftarAnak,
                jabatan_gereja: document.getElementById('jabatan').value,
                sub_bidang: document.getElementById('sub_pelayanan').value || "None",
                timestamp: serverTimestamp()
            };

            await addDoc(collection(db, "Administrator", "profile biodata", "daftar_anggota"), payload);
            
            document.getElementById('form-wrapper').classList.add('hidden');
            document.getElementById('success-msg').classList.remove('hidden');
            window.scrollTo(0,0);
        } catch (err) {
            alert("Terjadi kesalahan: " + err.message);
            btn.innerText = "KIRIM DATA SAYA";
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
